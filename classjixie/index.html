<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>机械1501班统计信息</title>
    <link href="https://cdn.bootcss.com/twitter-bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: paleturquoise;
        }
        input{
            margin: .3rem;
            box-shadow: 0 0 10px #000;
        }
        span{
            color: rgb(26, 113, 199);
            font-weight: bolder;
        }
        h3{
            font-size: 1.2rem;
            text-align: center;
            padding: .5rem;
        }
    </style>
</head>
<body>
    <h3>机械1501班统计信息</h3>
    <div class="container">
        <span>学号:</span>
        <input type="text" class="form form-control" placeholder="输入学号" >
        <span>姓名:</span>
        <input type="text" class="form form-control" placeholder="输入姓名">
        <span>性别:</span>
        <input type="text" class="form form-control" placeholder="输入姓别">
        <span>身份证号码:</span>
        <input type="text" class="form form-control" placeholder="输入身份证号">
        <span>银行卡号码:</span>
        <input type="text" class="form form-control" placeholder="输入银行卡号">
        <span>工商银行开户行:</span>
        <textarea class="form form-control" cols="20" rows="5"></textarea>
        <hr>
        <div class="text-center">
            <button class="btn btn-primary" >提交</button>
        </div>
    </div>
    <script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.min.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
